<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - RPG Creator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#0f172a;
    color:white;
    min-height:100vh;
}

nav{
    background:#1e293b;
    padding:20px 50px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    color:gold;
    font-size:28px;
    font-weight:bold;
}

nav ul{
    list-style:none;
    display:flex;
    gap:20px;
}

nav a{
    text-decoration:none;
    color:white;
}

nav a:hover{
    color:gold;
}

.container{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:85vh;
}

.login-box{
    width:400px;
    background:#1e293b;
    padding:40px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(255,215,0,0.2);
}

.login-box h1{
    text-align:center;
    color:gold;
    margin-bottom:25px;
}

.input-group{
    margin-bottom:18px;
}

.input-group label{
    display:block;
    margin-bottom:6px;
}

.input-group input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#334155;
    color:white;
}

.input-group input:focus{
    outline:2px solid gold;
}

.remember{
    display:flex;
    align-items:center;
    gap:8px;
    margin-bottom:20px;
}

.btn{
    width:100%;
    padding:14px;
    background:gold;
    color:black;
    border:none;
    border-radius:8px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

.btn:hover{
    opacity:0.9;
}

.signup-link{
    text-align:center;
    margin-top:20px;
}

.signup-link a{
    color:gold;
    text-decoration:none;
}

footer{
    text-align:center;
    padding:20px;
    background:#1e293b;
}
</style>
</head>

<body>

<nav>
    <div class="logo">RPG Creator</div>

    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="signup.html">Sign Up</a></li>
        <li><a href="login.html">Login</a></li>
    </ul>
</nav>

<div class="container">

    <div class="login-box">

        <h1>Player Login</h1>

        <form>

            <div class="input-group">
                <label>Username</label>
                <input type="text" placeholder="Enter username" required>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" placeholder="Enter password" required>
            </div>

            <div class="remember">
                <input type="checkbox" id="remember">
                <label for="remember">Remember Me</label>
            </div>

            <button class="btn" type="submit">
                Login
            </button>

        </form>

        <div class="signup-link">
            Don't have an account?
            <a href="signup.html">Create one</a>
        </div>

    </div>

</div>

<footer>
    © 2026 RPG Creator
</footer>

</body>
</html>
